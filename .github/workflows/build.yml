name: Build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

jobs:
  windows:
    name: Windows (x86-64 v1-v4)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-pc-windows-msvc
          rustup default stable

      - name: Build all microarchitecture levels
        shell: pwsh
        run: |
          $levels = @{
            "x86-64-v1" = "x86-64"
            "x86-64-v2" = "x86-64-v2"
            "x86-64-v3" = "x86-64-v3"
            "x86-64-v4" = "x86-64-v4"
          }
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          foreach ($name in $levels.Keys) {
            $cpu = $levels[$name]
            Write-Host "Building $name (target-cpu=$cpu)"
            $env:RUSTFLAGS = "-C target-cpu=$cpu"
            $env:CARGO_TARGET_DIR = "target-$name"
            cargo build --release --target x86_64-pc-windows-msvc --bin tape-decode
            if ($LASTEXITCODE -ne 0) { throw "build failed for $name" }
            New-Item -ItemType Directory -Force -Path "dist/$name" | Out-Null
            Copy-Item "target-$name/x86_64-pc-windows-msvc/release/tape-decode.exe" "dist/$name/tape-decode.exe"
            Copy-Item "target-$name/x86_64-pc-windows-msvc/release/tape-decode.pdb" "dist/$name/tape-decode.pdb"
          }

      - name: Package windows.7z
        shell: pwsh
        run: |
          & 7z a -t7z windows.7z .\dist\*
          if ($LASTEXITCODE -ne 0) { throw "7z packaging failed" }

      - name: Upload windows.7z
        uses: actions/upload-artifact@v7
        with:
          name: windows
          path: windows.7z

  linux:
    name: Oracle Linux 8 (x86-64 v1-v4)
    runs-on: ubuntu-latest
    container:
      image: oraclelinux:8
    steps:
      - name: Install build dependencies
        run: |
          dnf -y install gcc make tar xz findutils which
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build all microarchitecture levels
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          declare -A levels=(
            ["x86-64-v1"]="x86-64"
            ["x86-64-v2"]="x86-64-v2"
            ["x86-64-v3"]="x86-64-v3"
            ["x86-64-v4"]="x86-64-v4"
          )
          mkdir -p dist
          for name in "${!levels[@]}"; do
            cpu="${levels[$name]}"
            echo "Building $name (target-cpu=$cpu)"
            RUSTFLAGS="-C target-cpu=$cpu" CARGO_TARGET_DIR="target-$name" \
              cargo build --release --target x86_64-unknown-linux-gnu --bin tape-decode
            mkdir -p "dist/$name"
            cp "target-$name/x86_64-unknown-linux-gnu/release/tape-decode" "dist/$name/tape-decode"
            objcopy --only-keep-debug "dist/$name/tape-decode" "dist/$name/tape-decode.debug"
            strip --strip-debug --strip-unneeded "dist/$name/tape-decode"
            objcopy "--add-gnu-debuglink=dist/$name/tape-decode.debug" "dist/$name/tape-decode"
          done

      - name: Package linux.tar.xz
        run: |
          set -euo pipefail
          tar -cJf linux.tar.xz -C dist .

      - name: Upload linux.tar.xz
        uses: actions/upload-artifact@v7
        with:
          name: linux
          path: linux.tar.xz
